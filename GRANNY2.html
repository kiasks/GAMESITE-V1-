<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8"/>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
        
        <meta property="og:title" content="Granny 2 - Juega Gratis">
        <meta property="og:image" content="https://kiasks.github.io/GAMESITE-V1-/pagesprites/granny2portada.webp">
        <meta property="og:description" content="Sobrevive a Granny y Grandpa en esta secuela.">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:image" content="https://kiasks.github.io/GAMESITE-V1-/pagesprites/granny2portada.webp">

        <title>Unity WebGL Player | Granny 2</title>
        <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/forms-docs-slides-glgl/ngng@main/TemplateData/favicon.ico"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/ruffle@895d0224580381ddd003fc2ab72afead3cf134ad/john.css"/>
    </head>
    <body>
        <div id="unity-container" style="position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
            <canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%"></canvas>
            <div id="unity-loading-bar">
                <div id="unity-logo"></div>
                <div id="unity-progress-bar-empty">
                    <div id="unity-progress-bar-full"></div>
                </div>
            </div>
            <div id="unity-warning"></div>
        </div>

        <script>
            window.YaGames = {
                init: () => Promise.resolve({
                    adv: {
                        showFullscreenAdv: (c) => {
                            console.log("Anuncio saltado.");
                            c?.callbacks?.onOpen?.();
                            c?.callbacks?.onClose?.(true);
                        },
                        showRewardedVideo: (c) => {
                            console.log("Recompensa otorgada sin ver anuncio.");
                            c?.callbacks?.onOpen?.();
                            c?.callbacks?.onRewarded?.();
                            c?.callbacks?.onClose?.();
                        }
                    },
                    getPlayer: () => Promise.resolve({
                        getName: () => "Survivor",
                        getMode: () => "lite",
                        setData: () => Promise.resolve(),
                        getData: () => Promise.resolve({}),
                        getStats: () => Promise.resolve({})
                    }),
                    environment: { i18n: { lang: "en" } }
                })
            };
            window.ysdk = window.YaGames;
            var player;
            function initPlayer() {
                return window.YaGames.init().then(_sdk => {
                    window.ysdk = _sdk;
                    return _sdk.getPlayer().then(_p => { player = _p; return player; });
                });
            }
            initPlayer();
        </script>

        <script>
            var container = document.querySelector("#unity-container");
            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
            var warningBanner = document.querySelector("#unity-warning");

            function unityShowBanner(msg, type) {
                function updateBannerVisibility() {
                    warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
                }
                var div = document.createElement('div');
                div.innerHTML = msg;
                warningBanner.appendChild(div);
                if (type == 'error')
                    div.style = 'background: red; padding: 10px;';
                else {
                    if (type == 'warning')
                        div.style = 'background: yellow; padding: 10px;';
                    setTimeout(function() {
                        warningBanner.removeChild(div);
                        updateBannerVisibility();
                    }, 5000);
                }
                updateBannerVisibility();
            }

            async function mergeFiles(parts, onProgress) {
                let loaded = 0;
                const total = parts.length;
                const blobs = await Promise.all(parts.map(async (part) => {
                    const res = await fetch(part);
                    const blob = await res.blob();
                    loaded++;
                    if (onProgress) onProgress(loaded / total);
                    return blob;
                }));
                return URL.createObjectURL(new Blob(blobs));
            }

            async function initializeGame() {
                var buildUrl = "https://cdn.jsdelivr.net/gh/forms-docs-slides-glgl/ngng@main/Build";
                var loaderUrl = buildUrl + "/Granny 2.loader.js";
                var dataParts = [
                    buildUrl + "/Granny 2_part1.data", 
                    buildUrl + "/Granny 2_part2.data", 
                    buildUrl + "/Granny 2_part3.data"
                ];
                var wasmParts = [
                    buildUrl + "/Granny 2_part1.wasm", 
                    buildUrl + "/Granny 2_part2.wasm"
                ];

                loadingBar.style.display = "block";
                
                var dataUrl = await mergeFiles(dataParts, progress => {
                    progressBarFull.style.width = (50 * progress) + "%";
                });
                
                var wasmUrl = await mergeFiles(wasmParts, progress => {
                    progressBarFull.style.width = (50 + 50 * progress) + "%";
                });

                var config = {
                    dataUrl: dataUrl,
                    frameworkUrl: buildUrl + "/Granny 2.frameworkx.js",
                    codeUrl: wasmUrl,
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "Awesome",
                    productName: "Granny 2",
                    productVersion: "1.0",
                    showBanner: unityShowBanner,
                };

                var script = document.createElement("script");
                script.src = loaderUrl;
                script.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        progressBarFull.style.width = (100 * progress) + "%";
                    }).then((unityInstance) => {
                        window.myGameInstance = unityInstance;
                        setTimeout(() => { loadingBar.style.display = "none"; }, 500);
                    }).catch((message) => { alert(message); });
                };
                document.body.appendChild(script);
            }

            initializeGame();

            window.addEventListener('mousedown', () => {
                if(canvas) canvas.focus();
            });
        </script>
    </body>
</html>
