<!DOCTYPE html>
<html lang="es">

<head>
    <meta property="og:title" content="Five Nights at Candy's 2">
    <meta property="og:image" content="https://kiasks.github.io/GAMESITE-V1-/pagesprites/fnac2portada.webp">
    
    <base href="https://cdn.jsdelivr.net/gh/web-ports/fnac/2/">
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Five Nights at Candy's 2</title>
</head>

<body style="background-color: #000; margin: 0;">
    
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <canvas id="MMFCanvas" width="1280" height="720"> Your browser does not support Canvas. </canvas>
    </div>

    <div id="progress-container" style="position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 300px; color: white;">
        <div style="margin-bottom: 6px;">Downloading... <span id="download-text">0%</span></div>
        <div style="width: 100%; background: #444; border-radius: 6px; overflow: hidden;">
            <div id="download-bar" style="height: 10px; background: #3b82f6; width: 0%;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        // 🚨 ESTO ES LO QUE ARREGLA LAS CÁMARAS 🚨
        // Le dice al juego que los archivos están en el servidor de 'jsdelivr'
        // para que no los busque en tu carpeta local (donde no los encuentra)
        window.location.origin_fake = "https://cdn.jsdelivr.net/gh/web-ports/fnac/2/";
        
        // Fix para que el mouse funcione bien en las cámaras
        window.addEventListener('mousedown', function() {
            if (window.crunApp) window.crunApp.resume();
        });
    </script>

    <script src="main.js"></script>
</body>
</html>
