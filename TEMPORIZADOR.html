<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWGAME - Próximamente</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0050E6, #002060); /* Color del menú de tu juego */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }
        
        .container {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        #countdown {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin-top: 20px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
        }

        .number {
            display: block;
            font-size: 3rem;
            font-weight: bold;
            color: #25D366; /* El verde de tus botones */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ESTAMOS TRABAJANDO EN EL JUEGO</h1>
        <p>¡de mientras puedes probar los demas juegos!</p>
        
        <div id="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span> días
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span> horas
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span> min
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span> seg
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: 10 de abril de 2026
        const targetDate = new Date("April 15, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                clearInterval(timer);
                document.querySelector(".container").innerHTML = "<h1>¡EL JUEGO YA ESTÁ DISPONIBLE!</h1>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
            
        }, 1000);
    </script>
</body>
</html>
