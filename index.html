<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MY ULTIMATE ARCADE - (DEMO)</title>
    <link rel="icon" type="image/png" href="pagesprites/FAVICON.png">
    
    <style>
        body { 
            margin: 0; background: #050505; color: #fff; 
            font-family: 'Courier New', monospace; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        .menu-logo {
            max-width: 300px;
            height: auto;
            margin-top: 30px;
            filter: drop-shadow(0 0 15px #0f0);
        }

        #arcade-title {
            font-size: 45px; color: #0f0; text-shadow: 0 0 20px #0f0;
            margin-top: 10px; margin-bottom: 40px; letter-spacing: 5px;
            text-align: center;
        }

        .menu-container {
            display: flex; gap: 30px; perspective: 1000px; flex-wrap: wrap; justify-content: center;
            max-width: 1200px; padding: 20px;
        }

        /* TARJETA ACTUALIZADA PARA PORTADAS */
        .game-card {
            width: 220px; height: 320px; background: #111;
            border: 4px solid #333; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            cursor: pointer; transition: 0.4s;
            position: relative; overflow: hidden;
            box-sizing: border-box;
            background-size: cover; /* La imagen cubre todo */
            background-position: center;
        }

        /* Efecto de sombra para que el texto resalte sobre la imagen */
        .game-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 1;
        }

        .game-card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: var(--color);
            box-shadow: 0 0 30px var(--color);
        }

        .game-name { 
            font-size: 18px; font-weight: bold; text-align: center; 
            z-index: 2; margin-bottom: 20px; text-shadow: 2px 2px 4px #000;
        }

        /* ASIGNACIÓN DE PORTADAS */
        .snake-card { --color: #0f0; background-image: url('pagesprites/snakeportada.png'); }
        .fnf-card { --color: #ff00ff; background-image: url('pagesprites/fnfportada.jpg'); }
        .fruit-card { --color: #ffcc00; background-image: url('pagesprites/fruitninjaportada.png'); }
        .death-card { --color: #f00; background-image: url('pagesprites/deathcase1.png'); } /* Tu juego Death Case */
        .granny-card { --color: #888; background-image: url('pagesprites/grannyportada.jpg'); }
        .cut-the-rope-card { --color: #a3ff00; background-image: url('pagesprites/cuttherope.jpg'); }
        .htmlphysics-card { --color: #0088ff; background-image: url('GAMESSPRITES/LOGOHTMLPHYSICS.png'); }

        #game-frame-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
        }

        iframe { width: 100%; height: 100%; border: none; }

        #back-btn {
            position: absolute; top: 20px; left: 20px; 
            padding: 10px 20px; background: #222; color: #fff;
            border: 2px solid #555; cursor: pointer; z-index: 110;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <img src="pagesprites/uptadelogo.png" alt="Logo Arcade" class="menu-logo">

    <h1 id="arcade-title">ARCADE SELECTION</h1>

    <div class="menu-container">
        <div class="game-card snake-card" onclick="openGame('snake.html')">
            <div class="game-name">SNAKE 3D<br>SMOOTH</div>
        </div>

        <div class="game-card fnf-card" onclick="openGame('FNFORIGINAL.html')">
            <div class="game-name">FRIDAY NIGHT<br>FUNKIN</div>
        </div>
        
        <div class="game-card fruit-card" onclick="openGame('FRUITNINJA!!.html')">
            <div class="game-name">FRUIT<br>NINJA</div>
        </div>
        
        <div class="game-card death-card" onclick="openGame('DEATHCASE1.html')">
            <div class="game-name">DEATH CASE<br>(DEMO)</div>
        </div>

        <div class="game-card granny-card" onclick="openGame('grannyinfinite.html')">
            <div class="game-name">GRANNY<br>ORIGINAL</div>
        </div>  
        
        <div class="game-card granny2-card" onclick="openGame('NO HTML')">
            <div class="game-name">GRANNY2<br>ORIGINAL</div>
        </div>  

        <div class="game-card hoollowknigth-card" onclick="openGame('HOLLOWKINIGTH.html')">
            <div class="game-name">HOLLOW<br>KNIGTH</div>
        </div>  

        <div class="game-card baldisbasicsR-card" onclick="openGame('BALDIREMASTERED.html')">
            <div class="game-name">BALDIS BASICS<br>REMASTERED</div>
        </div> 
        
        <div class="game-card fnaf3-card" onclick="openGame('FNAF3.html')">
            <div class="game-name">FIVE NIGHTS AT FREDIS<br>3</div>
        </div>  
        
          <div class="game-card fnac2-card" onclick="openGame('FNAC2.html')">
            <div class="game-name">FIVE NIGHTS AT CANDYS<br>2</div>
        </div>   
        
        <div class="game-card SOLARSMASH-card" onclick="openGame('SOLARSMASH.html')">
            <div class="game-name">SOLAR<br>SMASH</div>
        </div>  

          <div class="game-card JOLLY2-card" onclick="openGame('?.html')">
            <div class="game-name">J2<br></div>
        </div>  

        
        <div class="game-card jetpackjoyride-card" onclick="openGame('JETPACKJOYRIDE.html')">
            <div class="game-name">JETPACK<br>JOYRIDE</div>
        </div>
        
        <div class="game-card cut-the-rope-card" onclick="openGame('CUTTHEROPEORIGINAL.html')">
            <div class="game-name">CUT THE<br>ROPE</div>
        </div>

        <div class="game-card htmlphysics-card" onclick="openGame('HTMLphysics.html')">
            <div class="game-name">HTML<br>physics 3D</div>
        </div>
    </div>

    <div id="game-frame-container">
        <button id="back-btn" onclick="closeGame()">ESC - VOLVER AL MENÚ</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function openGame(file) {
            const container = document.getElementById('game-frame-container');
            const frame = document.getElementById('game-frame');
            frame.src = file;
            container.style.display = 'block';
            frame.focus();
        }

        function closeGame() {
            const container = document.getElementById('game-frame-container');
            const frame = document.getElementById('game-frame');
            frame.src = "";
            container.style.display = 'none';
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === "Escape") closeGame();
        });
    </script>
</body>
</html>
